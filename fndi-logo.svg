<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="500" height="100">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="100" fill="#030308" rx="12"/>

  <!-- Subtle glow behind icon -->
  <circle cx="50" cy="50" r="30" fill="url(#glowGrad)" opacity="0.4"/>

  <!-- Icon: Abstract AI neural node -->
  <circle cx="50" cy="50" r="16" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.9"/>
  <circle cx="50" cy="50" r="6" fill="url(#accentGrad)"/>

  <!-- Neural connection lines -->
  <line x1="50" y1="34" x2="50" y2="24" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="66" x2="50" y2="76" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="50" x2="24" y2="50" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="66" y1="50" x2="76" y2="50" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>

  <!-- Diagonal connections -->
  <line x1="38.7" y1="38.7" x2="31" y2="31" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="61.3" y1="38.7" x2="69" y2="31" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="38.7" y1="61.3" x2="31" y2="69" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="61.3" y1="61.3" x2="69" y2="69" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>

  <!-- Outer dots -->
  <circle cx="50" cy="24" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="50" cy="76" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="24" cy="50" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="76" cy="50" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="31" cy="31" r="2.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="69" cy="31" r="2.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="31" cy="69" r="2.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="69" cy="69" r="2.5" fill="#a78bfa" opacity="0.5"/>

  <!-- FNDI Text -->
  <text x="100" y="58" font-family="'Space Grotesk', 'Inter', -apple-system, sans-serif" font-weight="700" font-size="42" fill="#f1f5f9" letter-spacing="3" filter="url(#glow)">FNDI</text>

  <!-- Accent line under text -->
  <rect x="100" y="68" width="120" height="2" rx="1" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="100" y="84" font-family="'Inter', -apple-system, sans-serif" font-weight="400" font-size="11" fill="#94a3b8" letter-spacing="2">FUTURE NATIVE DIGITAL INTELLIGENCE</text>
</svg>