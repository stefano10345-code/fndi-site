<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon: Abstract AI neural node -->
  <circle cx="30" cy="30" r="14" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.9"/>
  <circle cx="30" cy="30" r="5" fill="url(#accentGrad)"/>

  <!-- Neural connection lines -->
  <line x1="30" y1="16" x2="30" y2="8" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="44" x2="30" y2="52" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="30" x2="8" y2="30" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="30" x2="52" y2="30" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>

  <!-- Outer dots -->
  <circle cx="30" cy="8" r="2.5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="30" cy="52" r="2.5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="8" cy="30" r="2.5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="52" cy="30" r="2.5" fill="#a78bfa" opacity="0.8"/>

  <!-- FNDI Text -->
  <text x="68" y="38" font-family="'Space Grotesk', 'Inter', -apple-system, sans-serif" font-weight="700" font-size="32" fill="#f1f5f9" letter-spacing="2.5">FNDI</text>

  <!-- Accent line -->
  <rect x="68" y="45" width="90" height="1.5" rx="1" fill="url(#accentGrad)" opacity="0.5"/>
</svg>