<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon: Abstract AI neural node -->
  <circle cx="40" cy="40" r="16" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.9"/>
  <circle cx="40" cy="40" r="6" fill="#7c3aed"/>

  <!-- Neural connection lines -->
  <line x1="40" y1="24" x2="40" y2="14" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="56" x2="40" y2="66" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="24" y1="40" x2="14" y2="40" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="56" y1="40" x2="66" y2="40" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>

  <!-- Outer dots -->
  <circle cx="40" cy="14" r="3" fill="#7c3aed" opacity="0.7"/>
  <circle cx="40" cy="66" r="3" fill="#7c3aed" opacity="0.7"/>
  <circle cx="14" cy="40" r="3" fill="#7c3aed" opacity="0.7"/>
  <circle cx="66" cy="40" r="3" fill="#7c3aed" opacity="0.7"/>

  <!-- FNDI Text -->
  <text x="85" y="46" font-family="'Space Grotesk', 'Inter', -apple-system, sans-serif" font-weight="700" font-size="38" fill="#0f0f24" letter-spacing="3">FNDI</text>

  <!-- Accent line -->
  <rect x="85" y="54" width="110" height="2" rx="1" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="85" y="69" font-family="'Inter', -apple-system, sans-serif" font-weight="500" font-size="9.5" fill="#64748b" letter-spacing="2">FUTURE NATIVE DIGITAL INTELLIGENCE</text>
</svg>