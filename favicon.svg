<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Purple circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="5" fill="#ffffff"/>

  <!-- Cardinal connection lines -->
  <line x1="32" y1="18" x2="32" y2="9" stroke="#c4b5fd" stroke-width="2" opacity="0.85"/>
  <line x1="32" y1="46" x2="32" y2="55" stroke="#c4b5fd" stroke-width="2" opacity="0.85"/>
  <line x1="18" y1="32" x2="9" y2="32" stroke="#c4b5fd" stroke-width="2" opacity="0.85"/>
  <line x1="46" y1="32" x2="55" y2="32" stroke="#c4b5fd" stroke-width="2" opacity="0.85"/>

  <!-- Diagonal connection lines -->
  <line x1="22.1" y1="22.1" x2="16" y2="16" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
  <line x1="41.9" y1="22.1" x2="48" y2="16" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
  <line x1="22.1" y1="41.9" x2="16" y2="48" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
  <line x1="41.9" y1="41.9" x2="48" y2="48" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>

  <!-- Cardinal outer dots -->
  <circle cx="32" cy="8" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="32" cy="56" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="8" cy="32" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="56" cy="32" r="3.5" fill="#ffffff" opacity="0.9"/>

  <!-- Diagonal outer dots -->
  <circle cx="15" cy="15" r="3" fill="#c4b5fd" opacity="0.75"/>
  <circle cx="49" cy="15" r="3" fill="#c4b5fd" opacity="0.75"/>
  <circle cx="15" cy="49" r="3" fill="#c4b5fd" opacity="0.75"/>
  <circle cx="49" cy="49" r="3" fill="#c4b5fd" opacity="0.75"/>
</svg>